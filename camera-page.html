<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captured Memories</title>
    <link rel="stylesheet" href="camera-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="gallery-wrapper">
        
        <div class="corner-text top-left">a place of memories</div>
        <div class="corner-text bottom-right">I love you</div>

        <div class="photo-space">
            
            <div class="polaroid-frame p-left">
                <div class="photo-slot">
                    <img src="polarr.png" alt="Memory 1">
                </div>
                <div class="heart-arrow">
                    <span>Your pics here</span>
                </div>
            </div>

            <div class="photo-strip strip-1">
                <div class="strip-photo"><img src="polarr.png" alt="Strip 1"></div>
                <div class="strip-photo"><img src="polarr.png" alt="Strip 2"></div>
                <div class="strip-photo"><img src="polarr.png" alt="Strip 3"></div>
            </div>

            <div class="photo-strip strip-2">
                <div class="strip-photo"><img src="polarr.png" alt="Strip 4"></div>
                <div class="strip-photo"><img src="polarr.png" alt="Strip 5"></div>
                <div class="strip-photo"><img src="polarr.png" alt="Strip 6"></div>
            </div>

            <div class="polaroid-frame p-right">
                <div class="photo-slot">
                    <img src="polarr.png" alt="Memory 4">
                </div>
            </div>

        </div>

    </div>

    <a href="index.html" class="home-btn">
        <i class="fa-solid fa-house"></i>
    </a>

</body>
</html>
